name: Build and Release Nordic Wi-Fi Memfault

on:
  push:
    branches: [ main, dev/refactoring ]
    tags:
      - 'v*'  # Release tags follow v<ncs-version>.<build>, e.g. v3.3.0.1, v3.3.0.2
  pull_request:
    branches: [ main, dev/refactoring ]

# Cancel any in-progress run for the same branch/PR to avoid wasting CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  set-version:
    runs-on: ubuntu-24.04
    outputs:
      NCS_VERSION: ${{ steps.extract-version.outputs.NCS_VERSION }}
      TOOLCHAIN_VERSION: ${{ steps.extract-version.outputs.TOOLCHAIN_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/memfault-nrf7002dk

      - name: Extract NCS version from west.yml
        id: extract-version
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          NCS_VERSION=$(awk '
            $1=="-" && $2=="name:" && $3=="sdk-nrf" { in_sdk=1; next }
            in_sdk && $1=="revision:" { print $2; exit }
          ' west.yml)
          if [ -z "${NCS_VERSION}" ]; then
            echo "Failed to extract sdk-nrf revision from west.yml" >&2
            exit 1
          fi
          echo "NCS_VERSION=${NCS_VERSION}" >> $GITHUB_OUTPUT
          # The toolchain Docker image tag matches the NCS revision exactly.
          echo "TOOLCHAIN_VERSION=${NCS_VERSION}" >> $GITHUB_OUTPUT

  build-and-test:
    needs: set-version
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-version.outputs.TOOLCHAIN_VERSION }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        config:
          - name: "nRF7002DK"
            build_dir: "build_nrf7002dk"
            board: "nrf7002dk/nrf5340/cpuapp"
            cmake_args: ""
          - name: "nRF54LM20DK + nRF7002EB2"
            build_dir: "build_nrf54lm20dk_wifi"
            board: "nrf54lm20dk/nrf54lm20a/cpuapp"
            cmake_args: "-DSHIELD=nrf7002eb2"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/memfault-nrf7002dk

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            app-workspace/nrf
            app-workspace/zephyr
            app-workspace/modules
            app-workspace/nrfxlib
            app-workspace/bootloader
          key: west-${{ needs.set-version.outputs.NCS_VERSION }}-${{ hashFiles('app-workspace/memfault-nrf7002dk/west.yml') }}

      - name: Prepare west workspace
        working-directory: app-workspace
        run: |
          west init -l memfault-nrf7002dk
          west update -o=--depth=1 -n

      - name: Create Memfault project key overlay
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          # Use the GitHub secret if available; fall back to the dummy key in prj.conf
          if [ -n "${{ secrets.MEMFAULT_PROJECT_KEY }}" ]; then
            echo 'CONFIG_MEMFAULT_NCS_PROJECT_KEY="${{ secrets.MEMFAULT_PROJECT_KEY }}"' > overlay-ci-key.conf
            echo "Using MEMFAULT_PROJECT_KEY from GitHub secrets"
          else
            echo "# No secret set; build uses dummy key from prj.conf" > overlay-ci-key.conf
            echo "No MEMFAULT_PROJECT_KEY secret configured; using dummy key"
          fi

      - name: Build ${{ matrix.config.name }}
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          BUILD_LOG="${{ matrix.config.build_dir }}/build.log"
          mkdir -p "${{ matrix.config.build_dir }}"
          set -o pipefail
          west build -p -b ${{ matrix.config.board }} -d ${{ matrix.config.build_dir }} -- \
            ${{ matrix.config.cmake_args }} \
            -DEXTRA_CONF_FILE="overlay-ci-key.conf" 2>&1 | tee "$BUILD_LOG"

      - name: Extract memory usage for ${{ matrix.config.name }}
        if: always()
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          BUILD_LOG="${{ matrix.config.build_dir }}/build.log"
          USAGE_SUMMARY="${{ matrix.config.build_dir }}/usage-summary.txt"

          if [ -f "$BUILD_LOG" ]; then
            ROM_USAGE="$(awk '/^[[:space:]]*FLASH:/ {print $2 " " $3 " / " $4 " " $5 " (" $6 ")"}' "$BUILD_LOG" | tail -n 1)"
            RAM_USAGE="$(awk '/^[[:space:]]*RAM:/ {print $2 " " $3 " / " $4 " " $5 " (" $6 ")"}' "$BUILD_LOG" | tail -n 1)"
          else
            ROM_USAGE="n/a"
            RAM_USAGE="n/a"
          fi

          : "${ROM_USAGE:=n/a}"
          : "${RAM_USAGE:=n/a}"

          {
            echo "ROM_USAGE=$ROM_USAGE"
            echo "RAM_USAGE=$RAM_USAGE"
          } > "$USAGE_SUMMARY"

          echo "ROM usage: $ROM_USAGE"
          echo "RAM usage: $RAM_USAGE"

      - name: Capture size report for ${{ matrix.config.name }}
        if: always()
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          ELF_PATH="${{ matrix.config.build_dir }}/memfault-nrf7002dk/zephyr/zephyr.elf"
          SIZE_REPORT="${{ matrix.config.build_dir }}/size-report.txt"
          SIZE_TOOL="$(command -v arm-zephyr-eabi-size || command -v llvm-size || command -v size)"

          echo "ELF: ${ELF_PATH}" > "$SIZE_REPORT"
          echo "Tool: ${SIZE_TOOL}" >> "$SIZE_REPORT"
          echo >> "$SIZE_REPORT"

          if [ -f "$ELF_PATH" ] && [ -n "$SIZE_TOOL" ]; then
            "$SIZE_TOOL" "$ELF_PATH" >> "$SIZE_REPORT"
          else
            echo "size data unavailable" >> "$SIZE_REPORT"
          fi

          echo "Generated size report: $SIZE_REPORT"

      - name: Stage artifacts for ${{ matrix.config.name }}
        if: always()
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          STAGE="artifact-staging-${{ matrix.config.build_dir }}"
          mkdir -p "$STAGE"
          for f in build.log usage-summary.txt size-report.txt; do
            cp "${{ matrix.config.build_dir }}/$f" "$STAGE/" 2>/dev/null || true
          done
          ELF="${{ matrix.config.build_dir }}/memfault-nrf7002dk/zephyr/zephyr.elf"
          [ -f "$ELF" ] && cp "$ELF" "$STAGE/" || true

      - name: Upload artifacts for ${{ matrix.config.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: build-${{ matrix.config.build_dir }}
          path: app-workspace/memfault-nrf7002dk/artifact-staging-${{ matrix.config.build_dir }}/

  # ─────────────────────────────────────────────────────────────
  # Release jobs: only on version tags (e.g. v3.3.0.1)
  # Builds firmware for both hardware targets, then publishes a
  # GitHub Release with nord-project artifacts.
  # ─────────────────────────────────────────────────────────────
  build-release:
    needs: set-version
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-version.outputs.TOOLCHAIN_VERSION }}
    defaults:
      run:
        shell: bash
    env:
      NORD_KEY: ${{ secrets.NORD_PROJECT_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/memfault-nrf7002dk
          fetch-depth: 0

      - name: Prepare west workspace
        working-directory: app-workspace
        run: |
          west init -l memfault-nrf7002dk
          west update -o=--depth=1 -n

      - name: Extract version from tag
        id: ver
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building release ${VERSION}"

      # ── nord_project build ──────────────────────────────────
      - name: Create overlay — nord_project
        working-directory: app-workspace/memfault-nrf7002dk
        env:
          VER: ${{ steps.ver.outputs.VERSION }}
        run: |
          echo "CONFIG_MEMFAULT_NCS_PROJECT_KEY=\"${NORD_KEY}\"" > overlay-release-key.conf
          echo "CONFIG_MEMFAULT_NCS_FW_VERSION=\"${VER}\""      >> overlay-release-key.conf

      - name: Build nRF7002DK — nord_project
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          mkdir -p build_nrf7002dk
          set -o pipefail
          west build -p -b nrf7002dk/nrf5340/cpuapp -d build_nrf7002dk -- \
            -DEXTRA_CONF_FILE="overlay-release-key.conf" 2>&1 | tee build_nrf7002dk/build.log

      - name: Resolve merged hex — nRF7002DK (nord_project)
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          BUILD_DIR="build_nrf7002dk"
          MERGED="${BUILD_DIR}/merged.hex"
          if [ -f "${MERGED}" ]; then
            echo "merged.hex already exists"
          elif [ -f "${BUILD_DIR}/merged_domains.hex" ]; then
            cp "${BUILD_DIR}/merged_domains.hex" "${MERGED}"
            echo "Using merged_domains.hex"
          else
            echo "merged.hex not found — creating from component hex files"
            MCUBOOT="${BUILD_DIR}/mcuboot/zephyr/zephyr.hex"
            APP_S="${BUILD_DIR}/memfault-nrf7002dk/zephyr/zephyr.signed.hex"
            APP_P="${BUILD_DIR}/memfault-nrf7002dk/zephyr/zephyr.hex"
            CPUNET="${BUILD_DIR}/hci_ipc/zephyr/zephyr.hex"
            PARTS=""
            [ -f "${MCUBOOT}" ] && PARTS="${PARTS} ${MCUBOOT}"
            if [ -f "${APP_S}" ]; then PARTS="${PARTS} ${APP_S}"
            elif [ -f "${APP_P}" ]; then PARTS="${PARTS} ${APP_P}"
            fi
            [ -f "${CPUNET}" ]  && PARTS="${PARTS} ${CPUNET}"
            if [ -n "${PARTS}" ]; then
              {
                echo 'import sys'
                echo 'from intelhex import IntelHex'
                echo 'out = IntelHex()'
                echo 'for f in sys.argv[1:-1]:'
                echo '  ih = IntelHex(); ih.loadhex(f); out.merge(ih, overlap="replace")'
                echo 'out.write_hex_file(sys.argv[-1])'
                echo 'print("merged.hex created from: " + " ".join(sys.argv[1:-1]))'
              } | python3 - ${PARTS} "${MERGED}"
            else
              echo "ERROR: no hex files found in ${BUILD_DIR}"; find "${BUILD_DIR}" -name "*.hex" | head -20; exit 1
            fi
          fi

      - name: Extract memory usage — nRF7002DK
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          BUILD_LOG="build_nrf7002dk/build.log"
          # Use the largest FLASH/RAM value — that is the main app, not MCUboot/hci_ipc
          ROM_USAGE="$(awk '/^[[:space:]]*FLASH:/ {
            n=$2+0; if (n>max_f) { max_f=n; line_f=$2 " " $3 " / " $4 " " $5 " (" $6 ")" }
          } END { print line_f }' "$BUILD_LOG")"
          RAM_USAGE="$(awk '/^[[:space:]]*RAM:/ {
            n=$2+0; if (n>max_r) { max_r=n; line_r=$2 " " $3 " / " $4 " " $5 " (" $6 ")" }
          } END { print line_r }' "$BUILD_LOG")"
          : "${ROM_USAGE:=n/a}"
          : "${RAM_USAGE:=n/a}"
          printf "ROM_USAGE=%s\nRAM_USAGE=%s\n" "$ROM_USAGE" "$RAM_USAGE" > release-usage-nrf7002dk.txt
          echo "nRF7002DK  ROM: $ROM_USAGE | RAM: $RAM_USAGE"

      - name: Build nRF54LM20DK — nord_project
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          mkdir -p build_nrf54lm20dk_wifi
          set -o pipefail
          west build -p -b nrf54lm20dk/nrf54lm20a/cpuapp -d build_nrf54lm20dk_wifi -- \
            -DSHIELD=nrf7002eb2 -DEXTRA_CONF_FILE="overlay-release-key.conf" 2>&1 | tee build_nrf54lm20dk_wifi/build.log

      - name: Resolve merged hex — nRF54LM20DK (nord_project)
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          BUILD_DIR="build_nrf54lm20dk_wifi"
          MERGED="${BUILD_DIR}/merged.hex"
          if [ -f "${MERGED}" ]; then
            echo "merged.hex already exists"
          elif [ -f "${BUILD_DIR}/merged_domains.hex" ]; then
            cp "${BUILD_DIR}/merged_domains.hex" "${MERGED}"
            echo "Using merged_domains.hex"
          else
            echo "merged.hex not found — creating from component hex files"
            MCUBOOT="${BUILD_DIR}/mcuboot/zephyr/zephyr.hex"
            APP_S="${BUILD_DIR}/memfault-nrf7002dk/zephyr/zephyr.signed.hex"
            APP_P="${BUILD_DIR}/memfault-nrf7002dk/zephyr/zephyr.hex"
            PARTS=""
            [ -f "${MCUBOOT}" ] && PARTS="${PARTS} ${MCUBOOT}"
            if [ -f "${APP_S}" ]; then PARTS="${PARTS} ${APP_S}"
            elif [ -f "${APP_P}" ]; then PARTS="${PARTS} ${APP_P}"
            fi
            if [ -n "${PARTS}" ]; then
              {
                echo 'import sys'
                echo 'from intelhex import IntelHex'
                echo 'out = IntelHex()'
                echo 'for f in sys.argv[1:-1]:'
                echo '  ih = IntelHex(); ih.loadhex(f); out.merge(ih, overlap="replace")'
                echo 'out.write_hex_file(sys.argv[-1])'
                echo 'print("merged.hex created from: " + " ".join(sys.argv[1:-1]))'
              } | python3 - ${PARTS} "${MERGED}"
            else
              echo "ERROR: no hex files found in ${BUILD_DIR}"; find "${BUILD_DIR}" -name "*.hex" | head -20; exit 1
            fi
          fi

      - name: Extract memory usage — nRF54LM20DK
        working-directory: app-workspace/memfault-nrf7002dk
        run: |
          BUILD_LOG="build_nrf54lm20dk_wifi/build.log"
          ROM_USAGE="$(awk '/^[[:space:]]*FLASH:/ {
            n=$2+0; if (n>max_f) { max_f=n; line_f=$2 " " $3 " / " $4 " " $5 " (" $6 ")" }
          } END { print line_f }' "$BUILD_LOG")"
          RAM_USAGE="$(awk '/^[[:space:]]*RAM:/ {
            n=$2+0; if (n>max_r) { max_r=n; line_r=$2 " " $3 " / " $4 " " $5 " (" $6 ")" }
          } END { print line_r }' "$BUILD_LOG")"
          : "${ROM_USAGE:=n/a}"
          : "${RAM_USAGE:=n/a}"
          printf "ROM_USAGE=%s\nRAM_USAGE=%s\n" "$ROM_USAGE" "$RAM_USAGE" > release-usage-nrf54lm20dk.txt
          echo "nRF54LM20DK  ROM: $ROM_USAGE | RAM: $RAM_USAGE"

      - name: Stage nord_project artifacts
        working-directory: app-workspace/memfault-nrf7002dk
        env:
          VER: ${{ steps.ver.outputs.VERSION }}
        run: |
          mkdir -p release
          cp build_nrf7002dk/memfault-nrf7002dk/zephyr/zephyr.elf \
             release/nordic-wifi-memfault-nrf7002dk-nord-project-${VER}.elf
          cp build_nrf7002dk/memfault-nrf7002dk/zephyr/zephyr.signed.bin \
             release/nordic-wifi-memfault-nrf7002dk-nord-project-${VER}.signed.bin
          cp build_nrf7002dk/merged.hex \
             release/nordic-wifi-memfault-nrf7002dk-nord-project-${VER}.hex
          cp build_nrf54lm20dk_wifi/memfault-nrf7002dk/zephyr/zephyr.elf \
             release/nordic-wifi-memfault-nrf54lm20dk-nrf7002ebii-nord-project-${VER}.elf
          cp build_nrf54lm20dk_wifi/memfault-nrf7002dk/zephyr/zephyr.signed.bin \
             release/nordic-wifi-memfault-nrf54lm20dk-nrf7002ebii-nord-project-${VER}.signed.bin
          cp build_nrf54lm20dk_wifi/merged.hex \
             release/nordic-wifi-memfault-nrf54lm20dk-nrf7002ebii-nord-project-${VER}.hex
          cp release-usage-nrf7002dk.txt release/
          cp release-usage-nrf54lm20dk.txt release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.ver.outputs.VERSION }}
          path: app-workspace/memfault-nrf7002dk/release/

  create-release:
    needs: [set-version, build-release, static-analysis]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ steps.ver.outputs.VERSION }}
          path: release/

      - name: Generate release notes
        id: release-notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release — no previous tag found"
            CHANGELOG="Initial release of Nordic Wi-Fi Memfault"
          else
            echo "Generating changelog from $PREV_TAG to ${{ steps.ver.outputs.VERSION }}"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          echo "$CHANGELOG" > /tmp/changelog.txt
          COMMIT_COUNT=$(git rev-list ${PREV_TAG}..HEAD --count 2>/dev/null || echo "0")
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Prepare release body
        run: |
          read_usage() {
            local file="$1"
            local key="$2"
            grep "^${key}=" "$file" 2>/dev/null | cut -d= -f2-
          }

          VER="${{ steps.ver.outputs.VERSION }}"
          REPO="${{ github.server_url }}/${{ github.repository }}"
          DL_BASE="${REPO}/releases/download/${VER}"

          NRF7002DK_ROM="$(read_usage "release/release-usage-nrf7002dk.txt"   ROM_USAGE)"
          NRF7002DK_RAM="$(read_usage "release/release-usage-nrf7002dk.txt"   RAM_USAGE)"
          NRF54LM20_ROM="$(read_usage "release/release-usage-nrf54lm20dk.txt" ROM_USAGE)"
          NRF54LM20_RAM="$(read_usage "release/release-usage-nrf54lm20dk.txt" RAM_USAGE)"

          : "${NRF7002DK_ROM:=n/a}"
          : "${NRF7002DK_RAM:=n/a}"
          : "${NRF54LM20_ROM:=n/a}"
          : "${NRF54LM20_RAM:=n/a}"

          cat > /tmp/release-body.txt <<EOF
          ## Nordic Wi-Fi Memfault Release ${VER}

          > Built with NCS ${{ needs.set-version.outputs.NCS_VERSION }} — version format is \`v<ncs-version>.<build>\` (e.g. \`v3.3.0.1\`), where the major/minor/patch matches the NCS version this firmware is based on.

          ### 📦 Firmware Files

          Each release ships **6 files** across two hardware targets.

          | Board | Flash image | OTA image | Symbol file | ROM Usage | RAM Usage |
          |-------|-------------|-----------|-------------|-----------|-----------|
          | nRF7002DK | [nordic-wifi-memfault-nrf7002dk-nord-project-${VER}.hex](${DL_BASE}/nordic-wifi-memfault-nrf7002dk-nord-project-${VER}.hex) | [.signed.bin](${DL_BASE}/nordic-wifi-memfault-nrf7002dk-nord-project-${VER}.signed.bin) | [.elf](${DL_BASE}/nordic-wifi-memfault-nrf7002dk-nord-project-${VER}.elf) | ${NRF7002DK_ROM} | ${NRF7002DK_RAM} |
          | nRF54LM20DK + nRF7002EBII | [nordic-wifi-memfault-nrf54lm20dk-nrf7002ebii-nord-project-${VER}.hex](${DL_BASE}/nordic-wifi-memfault-nrf54lm20dk-nrf7002ebii-nord-project-${VER}.hex) | [.signed.bin](${DL_BASE}/nordic-wifi-memfault-nrf54lm20dk-nrf7002ebii-nord-project-${VER}.signed.bin) | [.elf](${DL_BASE}/nordic-wifi-memfault-nrf54lm20dk-nrf7002ebii-nord-project-${VER}.elf) | ${NRF54LM20_ROM} | ${NRF54LM20_RAM} |

          **File types:**
          - \`.hex\` — Full board image for initial provisioning via \`nrfutil device program\`
          - \`.signed.bin\` — OTA image for Memfault over-the-air update via MCUboot
          - \`.elf\` — Symbol file for Memfault crash decoding and coredump analysis

           For flashing and connection instructions, see the [Evaluator Quick Start guide](https://github.com/chshzh/nordic-wifi-memfault/blob/main/README.md#evaluator-quick-start) in the README.

          ### 📝 Changes Since Last Release

          EOF

          if [ -f /tmp/changelog.txt ]; then
            cat /tmp/changelog.txt >> /tmp/release-body.txt
          else
            echo "Initial release" >> /tmp/release-body.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nordic Wi-Fi Memfault ${{ steps.ver.outputs.VERSION }}"
          body_path: /tmp/release-body.txt
          files: |
            release/*.elf
            release/*.bin
            release/*.hex
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Terraforma private build
        if: success()
        env:
          DISPATCH_TOKEN: ${{ secrets.TERRAFORMA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "TERRAFORMA_DISPATCH_TOKEN not set — skipping private build trigger"
            exit 0
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/chshzh/nordic-wifi-memfault-terraforma/dispatches \
            -d "{\"event_type\":\"public-release\",\"client_payload\":{\"tag\":\"${{ steps.ver.outputs.VERSION }}\"}}") 
          echo "Dispatch HTTP status: ${HTTP}"
          if [ "${HTTP}" = "204" ]; then
            echo "Terraforma build triggered for ${{ steps.ver.outputs.VERSION }}"
          else
            echo "##[warning]Terraforma dispatch failed (HTTP ${HTTP}) — check TERRAFORMA_DISPATCH_TOKEN permissions (needs Actions: Write on the private repo)"
          fi

  static-analysis:
    needs: set-version
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-version.outputs.NCS_VERSION }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/memfault-nrf7002dk

      - name: Prepare west project
        working-directory: app-workspace
        run: |
          west init -l memfault-nrf7002dk
          west update -o=--depth=1 -n

      - name: Run Zephyr checkpatch
        working-directory: app-workspace
        run: |
          echo "Running Zephyr checkpatch on source files..."
          if [ -d memfault-nrf7002dk/src/ ]; then
            for file in $(find memfault-nrf7002dk/src/ -name "*.c" -o -name "*.h" 2>/dev/null); do
              if [ -f "$file" ]; then
                echo "Checking $file..."
                ./zephyr/scripts/checkpatch.pl --no-tree --file "$file" || true
              fi
            done
          fi
          echo "Checkpatch analysis completed ✓"
