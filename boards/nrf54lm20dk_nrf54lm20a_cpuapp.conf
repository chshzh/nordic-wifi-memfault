# Board-specific overrides for nRF54LM20DK + nRF7002EB II.
# Contains only settings that differ from prj.conf for this hardware.
#

# nRF7002EB2 on nRF54LM20DK does not wire the SR coexistence RF switch.
CONFIG_NRF70_SR_COEX=n
CONFIG_NRF70_SR_COEX_RF_SWITCH=n

# External flash: MX25R6435F (8 MB) via spi00 — MCUboot secondary OTA slot.
CONFIG_SPI_NOR=y
CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y
#CONFIG_FLASH_SHELL=y
# nRF54LM20A uses RRAMC, not NVMC. The default Memfault NCS coredump backend
# (memfault_flash_coredump_storage.c) calls nrfx_nvmc directly and will not
# compile on this target. Disable it so Memfault falls back to RAM coredumps.
# A native RRAMC coredump backend can be added in a future revision.
CONFIG_MEMFAULT_NCS_INTERNAL_FLASH_BACKED_COREDUMP=n
# Enable shell for development and debugging.
# (Disabled in prj.conf to save flash on nRF5340.)
CONFIG_SHELL=y
CONFIG_SHELL_GETOPT=y
CONFIG_DEVICE_SHELL=y
CONFIG_DATE_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_NET_L2_WIFI_SHELL=y
# CONFIG_SHELL_STACK_SIZE=5400

# nRF54LM20 is single-core: BLE SoftDevice Controller + WiFi share the
# Application core. Larger stacks than the prj.conf baseline (tuned for
# nRF5340 dual-core where BLE runs separately on the Network core).
CONFIG_MAIN_STACK_SIZE=5200
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=4096
# nRF54LM20DK is single-core: BLE SDC and WiFi share the application core,
# so the system workqueue handles significantly more work than on nRF7002DK.
# The default 4096-byte sysworkq stack overflows under combined BLE+WiFi load
# (DHCP timer work + WPA supplicant events compete on the same thread),
# causing net_ipv4_create() to fail silently with corrupted cursor state.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
# Increase TX net_pkt pool to reduce contention between DHCP and WiFi TX.
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=128

# ============================================================================
# Temporary debug logging — remove after DHCP issue is root-caused
# ============================================================================
# Bump app wifi/net_event modules to DBG (normally INF via DEFAULT level)
CONFIG_WIFI_MODULE_LOG_LEVEL_DBG=y
# Enable Zephyr net-stack logging so DHCPv4, L2, and connection manager
# internals are visible. Silence everything except the modules we care about.
CONFIG_NET_LOG=y
CONFIG_NET_DHCPV4_LOG_LEVEL_DBG=y
CONFIG_NET_L2_WIFI_MGMT_LOG_LEVEL_DBG=y
CONFIG_NET_CONNECTION_MANAGER_LOG_LEVEL_DBG=y
# Silence noisy modules to avoid flash overflow
CONFIG_NET_SOCKETS_LOG_LEVEL_OFF=y
CONFIG_DNS_RESOLVER_LOG_LEVEL_OFF=y
CONFIG_DNS_SD_LOG_LEVEL_OFF=y
CONFIG_NET_TCP_LOG_LEVEL_OFF=y
CONFIG_NET_IPV4_LOG_LEVEL_OFF=y
CONFIG_NET_IPV6_LOG_LEVEL_OFF=y
CONFIG_NET_IF_LOG_LEVEL_OFF=y
CONFIG_NET_MGMT_EVENT_LOG_LEVEL_OFF=y