# Board-specific overrides for nRF54LM20DK + nRF7002EB II.
# Contains only settings that differ from prj.conf for this hardware.
#

# nRF7002EB2 on nRF54LM20DK does not wire the SR coexistence RF switch.
CONFIG_NRF70_SR_COEX=n
CONFIG_NRF70_SR_COEX_RF_SWITCH=n

# nRF54LM20A uses RRAMC, not NVMC. The NCS flash backend
# (memfault_flash_coredump_storage.c) calls nrfx_nvmc directly and will not
# compile for this target — disable it and use the upstream RRAM backend
# (memfault_rram_backed_coredump.c) instead. That backend uses NRFX_RRAMC
# (available on nRF54LX) and reads/writes via direct memory-mapped access +
# nrf_rramc_config_set() with 16-byte (128-bit wordline) buffered writes.
# The partition must be named "memfault_coredump_partition" in pm_static.
CONFIG_MEMFAULT_NCS_INTERNAL_FLASH_BACKED_COREDUMP=n
CONFIG_MEMFAULT_COREDUMP_STORAGE_RRAM=y

# CRACEN hardware crypto (nRF54LM20A) adds extra stack depth compared to the
# software mbedTLS path used on nRF5340 (nRF7002DK). The CRACEN PSA driver
# stack: ctr_drbg_update -> sx_blkcipher_ecb_simple -> cracen_wait_for_interrupt
# -> nrf_security_event_wait -> k_event_wait_internal adds ~600 B of stack.
# Thread analyzer high-water marks (nRF54LM20DK, usage × 1.5 → target):
#   mqtt_helper_thread  2512/4096  → 3768 → 4096  (default 2560, raised to 4096)
#   mflt_ota_triggers   2640/6144  → 3960 → 6144  (no change)
#   mflt_http           3008/4096  → 4512 → 4608  (raised: CRACEN adds depth)
CONFIG_MQTT_HELPER_STACK_SIZE=4096
CONFIG_MEMFAULT_OTA_THREAD_STACK_SIZE=6144
CONFIG_MEMFAULT_HTTP_DEDICATED_WORKQUEUE_STACK_SIZE=4608

# MPSL (Multiprotocol Service Layer) registers RADIO/TIMER/RTC interrupts at
# priority 0 with IRQ_ZERO_LATENCY so they bypass arch_irq_lock()/BASEPRI.
# On this single-core SoC those ISRs can fire inside a K_SPINLOCK block and
# change _current before z_spin_unlock_valid() completes its owner check,
# causing a false-positive "Not my spinlock" assert (RESETREAS=0x80 lockup).
# This does not occur on nRF7002DK where BLE runs on the separate CPUNET core.
# CONFIG_SPIN_VALIDATE is a debug-only feature (Zephyr docs: "adds relatively
# hefty overhead") — disable it for this target so the assert cannot fire.
CONFIG_SPIN_VALIDATE=n

# Hardware MPU stack guard: raises a MemFault exception on stack overflow
# instead of silently corrupting adjacent memory. Requires one MPU region
# per thread so has a small RAM overhead, but is the safest protection on
# Cortex-M33 with MPU (nRF54LM20A has CONFIG_MPU=y).
CONFIG_MPU_STACK_GUARD=y
