# Minimal bring-up profile for nRF54LM20DK + nRF7002EB2.
# Focus on Wi-Fi connect and logging, mirroring the Wi-Fi shell workflow.

CONFIG_BUTTON_MODULE=n
CONFIG_HEAPS_MONITOR=n
CONFIG_WIFI_STA_PROV_OVER_BLE_ENABLED=n
CONFIG_APP_MEMFAULT_MODULE=n
CONFIG_APP_HTTPS_CLIENT_MODULE=n
CONFIG_APP_MQTT_CLIENT_MODULE=n

CONFIG_SHELL=y
CONFIG_SHELL_GETOPT=y
CONFIG_DEVICE_SHELL=y
CONFIG_DATE_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_SHELL=y

CONFIG_NRF70_SR_COEX=n
CONFIG_NRF70_SR_COEX_RF_SWITCH=n

# External flash (MX25R6435F via spi00) — driver + secondary MCUboot slot
CONFIG_SPI_NOR=y
CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y
CONFIG_FLASH_SHELL=y

CONFIG_MAIN_STACK_SIZE=5200
CONFIG_SHELL_STACK_SIZE=5400
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=4096
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=5000

CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_MAX_CONTEXTS=5
CONFIG_NET_MAX_CONN=5
CONFIG_NET_SOCKETS_POLL_MAX=12
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16

CONFIG_WIFI_NM_WPA_SUPPLICANT_LOG_LEVEL_INF=y