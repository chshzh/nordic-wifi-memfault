# Board-specific overrides for nRF7002DK (nRF5340 + nRF7002).
# Contains only settings that differ from prj.conf for this hardware.
# Configuration coverage priority:
# Command line > Overlay files > project boards/<board>.conf > prj.conf > Board defconfig
# (highest)

# Flash-backed coredump using the DTS `memfault_storage` partition (64 KB).
# CONFIG_MEMFAULT_NCS_INTERNAL_FLASH_BACKED_COREDUMP cannot be selected because
# it depends on PARTITION_MANAGER_ENABLED, which is not used for this board.
# The implementation is copied to src/modules/app_memfault/core/ to bypass the
# Kconfig dependency — the actual C code only requires FIXED_PARTITION_* DTS macros.
CONFIG_MEMFAULT_COREDUMP_STORAGE_CUSTOM=y

# Zego button module: board-specific button count
CONFIG_ZEGO_BUTTON_NUM_BUTTONS=2

# ============================================================================
# Silence the v3.3.0 Kconfig warning:
#   "MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG_ALLOW_NON_CSPRNG was assigned the value
#    'y' but got the value 'n'"
# The nrf7002dk_nrf5340_cpuapp_defconfig sets this symbol to 'y'.
# NRF_SECURITY selects DISABLE_MBEDTLS_BUILTIN and sets
# MBEDTLS_CFG_FILE="nrf-config.h", making the Kconfig.mbedtls menu
# (depends on MBEDTLS_BUILTIN && MBEDTLS_CFG_FILE="config-mbedtls.h")
# invisible.  The dependency is therefore unmet.  Explicitly clearing the
# symbol here overrides the defconfig assignment so the assigned value ('n')
# matches the evaluated value ('n').
#
# A related warning ("The choice symbol MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG was
# selected (set =y) but no symbol ended up as the choice selection") also
# originates from the board defconfig and cannot be silenced at the app
# level: kconfiglib does not honour "# CONFIG_CHOICE_SYMBOL is not set" for
# choice symbols, so the defconfig's choice assignment persists.  This is a
# known upstream issue (NRF_SECURITY overrides the choice via CMake, but the
# Kconfig layer is left inconsistent).  The warning is harmless; nrf_security
# always provides its own RNG implementation regardless of this choice.
# ============================================================================
# CONFIG_MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG_ALLOW_NON_CSPRNG is not set
