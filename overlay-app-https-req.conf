# App HTTPS Request Test overlay configuration
# Use this overlay to enable periodic HTTPS client requests

# Enable app HTTPS client functionality
CONFIG_APP_HTTPS_CLIENT_ENABLED=y

# Configure HTTPS hostname and interval
CONFIG_APP_HTTPS_HOSTNAME="example.com"
CONFIG_APP_HTTPS_REQUEST_INTERVAL_SEC=300

# App HTTPS client logging
CONFIG_APP_HTTPS_CLIENT_LOG_LEVEL_INF=y

# mbedTLS requirements for example.com (Cloudflare-hosted, cert chain via Comodo AAA root)
# RSA: needed to verify Comodo AAA root signature (RSA/SHA1 root CA)
CONFIG_MBEDTLS_RSA_C=y
# secp384r1: needed to verify P-384 ECC key in SSL.com TLS Transit ECC CA R2
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
# SNI: required for Cloudflare shared-IP hosting to present the correct certificate
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
