# Static partition map for nRF54LM20DK + nRF7002EB II
#
# RRAM layout (flash_primary = 0x1E5000 = 1940 KB available to cpuapp).
#
# NOTE (NCS v3.3.0): the board DTS now reserves the last 96 KB of RRAM for
# the FLPR MCU (see zephyr/dts/vendor/nordic/nrf54lm20_a_b_cpuapp_partition.dtsi),
# so cpuapp_rram is 0x1E5000 instead of the historical 0x1FD000. The app
# slot below is shrunk by 96 KB (0x1C4800 vs the former 0x1DC800) to keep
# settings_storage and memfault_coredump_partition at the end of flash.
#
#   Region            Address       Size         Notes
#   ──────────────────────────────────────────────────────────────────────
#   mcuboot           0x0000_0000   56 KB        Bootloader
#   mcuboot_pad       0x0000_E000    2 KB        MCUboot image header
#   app               0x0000_E800 1810 KB        Main app  (0x1C4800)
#   [mcuboot_primary = mcuboot_pad + app = 1812 KB = 0x1C5000]
#   settings_storage  0x001D_3000    8 KB        Wi-Fi credentials / NVS
#   memfault_coredump_partition  0x001D_5000   64 KB   Crash coredumps (RRAM backend)
#   [total = 0x1E5000 — exact fit]
#
# External flash (MX25R6435F, 8 MB via spi00):
#   mcuboot_secondary 0x000_0000 1812 KB        OTA slot (= primary size)
#   external_flash    0x1C5_000  ~6.2 MB        Reserved for app use

mcuboot:
  address: 0x0
  size: 0xE000
  region: flash_primary

mcuboot_pad:
  address: 0xE000
  size: 0x800

app:
  address: 0xE800
  size: 0x1C4800

mcuboot_primary:
  orig_span: &id001
  - mcuboot_pad
  - app
  span: *id001
  address: 0xE000
  size: 0x1C5000
  region: flash_primary

mcuboot_primary_app:
  orig_span: &id002
  - app
  span: *id002
  address: 0xE800
  size: 0x1C4800

settings_storage:
  address: 0x1D3000
  size: 0x2000
  region: flash_primary

memfault_coredump_partition:
  address: 0x1D5000
  size: 0x10000
  region: flash_primary

mcuboot_secondary:
  address: 0x0
  size: 0x1C5000
  device: MX25R64
  region: external_flash

external_flash:
  address: 0x1C5000
  size: 0x63B000
  device: MX25R64
  region: external_flash
