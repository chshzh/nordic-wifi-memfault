# Static partition map for nRF54LM20DK + nRF7002EB II
#
# RRAM layout (flash_primary = 0x1FD000 = 1984 KB):
#
#   Region            Address       Size         Notes
#   ──────────────────────────────────────────────────────────────────────
#   mcuboot           0x0000_0000   56 KB        Bootloader
#   mcuboot_pad       0x0000_E000    2 KB        MCUboot image header
#   app               0x0000_E800 1906 KB        Main app  (0x1DC800)
#   [mcuboot_primary = mcuboot_pad + app = 1908 KB = 0x1DD000]
#   settings_storage  0x001E_B000    8 KB        Wi-Fi credentials / NVS
#   memfault_storage  0x001E_D000   64 KB        Crash coredumps / metrics
#   [total = 0x1FD000 — exact fit]
#
# External flash (MX25R6435F, 8 MB via spi00):
#   mcuboot_secondary 0x000_0000 1908 KB        OTA slot (= primary size)
#   external_flash    0x1DD_000  ~6.1 MB        Reserved for app use

mcuboot:
  address: 0x0
  size: 0xE000
  region: flash_primary

mcuboot_pad:
  address: 0xE000
  size: 0x800

app:
  address: 0xE800
  size: 0x1DC800

mcuboot_primary:
  orig_span: &id001
  - mcuboot_pad
  - app
  span: *id001
  address: 0xE000
  size: 0x1DD000
  region: flash_primary

mcuboot_primary_app:
  orig_span: &id002
  - app
  span: *id002
  address: 0xE800
  size: 0x1DC800

settings_storage:
  address: 0x1EB000
  size: 0x2000
  region: flash_primary

memfault_storage:
  address: 0x1ED000
  size: 0x10000
  region: flash_primary

mcuboot_secondary:
  address: 0x0
  size: 0x1DD000
  device: MX25R64
  region: external_flash

external_flash:
  address: 0x1DD000
  size: 0x623000
  device: MX25R64
  region: external_flash
