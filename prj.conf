# ============================================================================
# WiFi Infrastructure  (network/Kconfig.defaults owns all tuning defaults)
# ============================================================================
# WPA supplicant log level (choice - cannot be in Kconfig.defaults)
CONFIG_WIFI_NM_WPA_SUPPLICANT_LOG_LEVEL_INF=y
# WiFi credentials backend (choice - cannot be in Kconfig.defaults)
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
# Network buffer mode (choice - cannot be in Kconfig.defaults)
CONFIG_NET_BUF_FIXED_DATA_SIZE=y
CONFIG_NRF_WIFI_ZERO_COPY_TX=n
# Crypto backend for WPA supplicant: legacy mbedTLS APIs are required so
# MBEDTLS_RSA_C remains available (gated by "if MBEDTLS_LEGACY_CRYPTO_C" in
# nrf_security/Kconfig.legacy). Without this, TLS connections to RSA-cert
# servers (Comodo AAA, DigiCert, Amazon Root CA) fail. The legacy path is
# enabled below in the mbedTLS section via CONFIG_MBEDTLS_LEGACY_CRYPTO_C.

# ============================================================================
# Module: heap_monitor
# ============================================================================
CONFIG_HEAPS_MONITOR=y
# Controls both Memfault metric update cadence AND the ZView mbedtls heap refresh rate.
# zview_mbedtls_stats is only written by report_mbedtls_heap(), so ZView shows stale
# zeros until the next periodic fire after a TLS session. Keep ≤10 s during development
# to see live mbedtls peak updates in ZView. Raise to match
# CONFIG_MEMFAULT_METRICS_HEARTBEAT_INTERVAL_SECS in production toh save CPU.
CONFIG_HEAPS_MONITOR_PERIODIC_INTERVAL_SEC=5
CONFIG_HEAPS_MONITOR_LOG_LEVEL_INF=y

# ============================================================================
# Module: ntp 
# ============================================================================
# Uses pool.ntp.org by default (see ntp/Kconfig.ntp for all options).
# Only enabled for nrf54lm20dk target since nrf7002dk has too less flash left.
CONFIG_NTP_MODULE=y
CONFIG_NTP_MODULE_LOG_LEVEL_INF=y
# Real-world timestamps in log output (requires NTP_MODULE to set CLOCK_REALTIME)
CONFIG_LOG_TIMESTAMP_USE_REALTIME=y
# Memfault event timestamps via CLOCK_REALTIME (memfault_platform_time.c reads it after NTP sync)
CONFIG_MEMFAULT_SYSTEM_TIME_SOURCE_CUSTOM=y
# At 40 ppm crystal drift: 1 s error after ~25000 s (~6.9 h).
# Re-sync every 6 h keeps drift under 0.9 s (40 ppm × 21600 s = 0.86 s).
CONFIG_NTP_RESYNC_INTERVAL_SEC=21600



# ============================================================================
# TLS / Sockets  (shared dependency for app_https_client and app_mqtt_client)
# ============================================================================
CONFIG_NET_SOCKETS_ENABLE_DTLS=n
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=5
CONFIG_NET_SOCKETS_TLS_MAX_CREDENTIALS=5
CONFIG_NET_SOCKETS_TLS_MAX_CIPHERSUITES=5
CONFIG_NET_SOCKETS_TLS_MAX_CLIENT_SESSION_COUNT=0
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=5

