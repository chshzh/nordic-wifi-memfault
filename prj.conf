# Configuration coverage priority:
# Command line > Overlay files > project boards/<board>.conf > prj.conf > Board defconfig
# (highest)                                                              (lowest)
#
# This file contains only:
#   - System-level configuration that belongs to no single module
#   - Module enable/disable flags
#   - Log-level choices (cannot be set via Kconfig.defaults)
#   - Project-specific overrides that differ from module defaults
#   - Shared cross-module settings (TLS, mbedTLS)
#   - Hardware-specific memory and stack tuning
#
# Module-specific defaults live in each module's Kconfig.defaults file.

# ============================================================================
# General System Configuration
# ============================================================================
CONFIG_DK_LIBRARY=y
CONFIG_FPU=y
CONFIG_ASSERT=y
CONFIG_HWINFO=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_HW_ID_LIBRARY_SOURCE_NET_MAC=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# File System
CONFIG_FILE_SYSTEM=y
CONFIG_ZMS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_SETTINGS_ZMS_CUSTOM_SECTOR_COUNT=y
CONFIG_SETTINGS_ZMS_SECTOR_COUNT=2

# POSIX
CONFIG_ZVFS_OPEN_MAX=39

# SMF + zbus modular architecture
CONFIG_SMF=y
CONFIG_ZBUS=y

# Shell - Disabled to save flash (Memfault shell unavailable)
# Re-enable for debugging: CONFIG_SHELL=y, CONFIG_MEMFAULT_SHELL=y
CONFIG_SHELL=n
CONFIG_NET_L2_WIFI_SHELL=n

# ============================================================================
