# Configuration coverage priority:
# Command line > Overlay files > project boards/<board>.conf > prj.conf > Board defconfig
# (highest)                                                              (lowest)

# ============================================================================
# General System Configuration
# ============================================================================
CONFIG_DK_LIBRARY=y
CONFIG_FPU=y
CONFIG_ASSERT=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_NAME=y

# Hardware ID
CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_NET_MAC=y

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# File System
CONFIG_FILE_SYSTEM=y
CONFIG_ZMS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_SETTINGS_ZMS_CUSTOM_SECTOR_COUNT=y
CONFIG_SETTINGS_ZMS_SECTOR_COUNT=2

# POSIX
CONFIG_ZVFS_OPEN_MAX=25

# SMF + zbus modular architecture
CONFIG_SMF=y
CONFIG_ZBUS=y

# Shell - Disabled to prevent interference with button GPIO
# Re-enable for debugging: CONFIG_SHELL=y, CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_SHELL=y
CONFIG_NET_L2_WIFI_SHELL=y

# ============================================================================
# Module Enable/Disable
# ============================================================================
CONFIG_WIFI_PROV_OVER_BLE_ENABLED=y
CONFIG_MEMFAULT=n
CONFIG_APP_HTTPS_CLIENT_ENABLED=n
CONFIG_APP_MQTT_CLIENT_ENABLED=n

# ============================================================================
# Bluetooth LE for WiFi Provisioning Module
# ============================================================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=n
CONFIG_BT_DEVICE_NAME_DYNAMIC=y

# BT Buffer Sizes
CONFIG_BT_BUF_ACL_RX_SIZE=151
CONFIG_BT_L2CAP_TX_MTU=147
CONFIG_BT_BUF_ACL_TX_SIZE=151

# BT RX Stack - CRITICAL: BLE and WiFi share same BT RX workqueue during provisioning
CONFIG_BT_RX_STACK_SIZE=22000

# BT Supervision Timeout - 75 units (750ms) to avoid timeout during WiFi scan
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=75

# WiFi Provisioning Libraries
CONFIG_BT_WIFI_PROV=y
CONFIG_WIFI_PROV_CORE=y
CONFIG_BT_WIFI_PROV_LOG_LEVEL_INF=y
CONFIG_WIFI_PROV_OVER_BLE_LOG_LEVEL_INF=y
CONFIG_NANOPB=y

# ============================================================================
# WiFi Network Module
# ============================================================================

# WiFi Driver Configuration
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
#CONFIG_WIFI_NRF_WIFI_LOW_POWER=n

# WPA Supplicant
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_LOG_LEVEL_INF=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8192
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=5632

# nRF70 Driver Settings
CONFIG_NRF_WIFI_SCAN_MAX_BSS_CNT=20
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=20000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=54856
CONFIG_NRF70_RX_NUM_BUFS=16
CONFIG_NRF70_MAX_TX_AGGREGATION=4

# WiFi/BLE Coexistence
CONFIG_NRF70_SR_COEX=y
CONFIG_NRF70_SR_COEX_RF_SWITCH=y
# CONFIG_NRF_WIFI_RPU_RECOVERY=y #depends on NRF_WIFI_LOW_POWER
# CONFIG_NRF_WIFI_RPU_RECOVERY_PS_ACTIVE_TIMEOUT_MS=30000

# L2 WiFi Connectivity
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=5168
CONFIG_L2_WIFI_CONNECTIVITY=y
CONFIG_L2_WIFI_CONNECTIVITY_AUTO_CONNECT=y
CONFIG_L2_WIFI_CONNECTIVITY_AUTO_DOWN=n

# WiFi Credentials
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y

# Network Stack Configuration
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_TCP_TIME_WAIT_DELAY=1000
CONFIG_NET_DHCPV4=y

# Network Buffers
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_BUF_FIXED_DATA_SIZE=y
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_TC_TX_COUNT=1

# Network Interface
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=1
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_MAX_CONN=10

# Sockets
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POLL_MAX=20
# ============================================================================
# Memfault Module (DISABLED)
# ============================================================================
CONFIG_MEMFAULT=n
