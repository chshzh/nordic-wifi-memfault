# ============================================================================
# HTTPS Client Module (DISABLED)
# ============================================================================
# When enabled, uncomment TLS socket configs:
# CONFIG_NET_SOCKETS_ENABLE_DTLS=n
# CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
# CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=5
# CONFIG_NET_SOCKETS_TLS_MAX_CREDENTIALS=5
# CONFIG_NET_SOCKETS_TLS_MAX_CIPHERSUITES=5
# CONFIG_NET_SOCKETS_TLS_MAX_CLIENT_SESSION_COUNT=0
# CONFIG_TLS_MAX_CREDENTIALS_NUMBER=5

# ============================================================================
# MQTT Client Module (DISABLED)
# ============================================================================
# When enabled, add MQTT-specific configs in this section.

# ============================================================================
# Memory & Stack Configuration
# ============================================================================
# Stack sizes (sized from thread analyzer high-water marks)
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=2048
# Shell stack not needed when shell is disabled
CONFIG_SHELL_STACK_SIZE=8000
CONFIG_MEMFAULT_SAMPLE_LOG_LEVEL_INF=y


# Memory & heap tuning
# Heap Configuration
# WPA supplicant and POSIX subsystems add ~46 KB through HEAP_MEM_POOL_ADD_SIZE_*
# BLE provisioning adds ~44KB more
CONFIG_HEAP_MEM_POOL_SIZE=40960
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NRF_WIFI_GLOBAL_HEAP=n

# WiFi provisioning coexistence tuning (BLE + WPA supplicant scan/connect)
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=130000
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=150
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# ============================================================================
# Logging Configuration
# ============================================================================
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096

# ============================================================================
# Debug & Optimization
# ============================================================================
# C Library
CONFIG_MINIMAL_LIBC=n
CONFIG_PICOLIBC=y
CONFIG_NEWLIB_LIBC=n

# Thread Analysis (for debugging)
# CONFIG_THREAD_ANALYZER=y
# CONFIG_DEBUG_THREAD_INFO=y
# CONFIG_THREAD_ANALYZER_USE_LOG=y
# CONFIG_THREAD_ANALYZER_AUTO=y
# CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=10

# Heap Monitoring (for debugging)
# CONFIG_SYS_HEAP_LISTENER=y
# CONFIG_SYS_HEAP_RUNTIME_STATS=y
# CONFIG_APP_HEAP_MONITOR=y
# CONFIG_APP_HEAP_MONITOR_WARN_PCT=88
# CONFIG_APP_HEAP_MONITOR_STEP_BYTES=256

# Tracing (for Segger SystemView)
# CONFIG_TRACING=y
# CONFIG_SEGGER_SYSTEMVIEW=y
# CONFIG_TRACING_BACKEND_RAM=y