# ============================================================================
# Module: app_memfault
# ============================================================================
CONFIG_MEMFAULT_LOGGING_ENABLE=y
CONFIG_MEMFAULT_LOGGING_RAM_SIZE=8192
CONFIG_MEMFAULT_LOG_LEVEL_INF=y
CONFIG_MEMFAULT_NCS_LOG_LEVEL_INF=y
CONFIG_MEMFAULT_SHELL=n
CONFIG_MEMFAULT_FOTA_CLI_CMD=n
CONFIG_MEMFAULT_HTTP_ENABLE=y
CONFIG_MEMFAULT_HTTP_PERIODIC_UPLOAD=y
CONFIG_MEMFAULT_HTTP_PERIODIC_UPLOAD_LOGS=y
CONFIG_MEMFAULT_HTTP_PERIODIC_UPLOAD_INTERVAL_SECS=60
CONFIG_MEMFAULT_COREDUMP_FULL_THREAD_STACKS=n
CONFIG_MEMFAULT_COREDUMP_COLLECT_BSS_REGIONS=n
CONFIG_MEMFAULT_NCS_INTERNAL_FLASH_BACKED_COREDUMP=y
CONFIG_MEMFAULT_NCS_FW_VERSION_STATIC=y
CONFIG_MEMFAULT_NCS_FW_VERSION="2.4.1"
CONFIG_MEMFAULT_METRICS_HEARTBEAT_INTERVAL_SECS=60
CONFIG_MEMFAULT_NCS_IMPLEMENT_METRICS_COLLECTION=n
CONFIG_MEMFAULT_NCS_BT_METRICS=n
CONFIG_MEMFAULT_NCS_LTE_METRICS=n
CONFIG_MEMFAULT_NCS_STACK_METRICS=y

# Metrics
CONFIG_MEMFAULT_METRICS=y
CONFIG_MEMFAULT_METRICS_CPU_TEMP=n
CONFIG_MEMFAULT_METRICS_WIFI=y
CONFIG_MEMFAULT_METRICS_CONNECTIVITY_CONNECTED_TIME=y
CONFIG_MEMFAULT_METRICS_BLUETOOTH=n
CONFIG_MEMFAULT_METRICS_DEFAULT_SET_ENABLE=y
CONFIG_MEMFAULT_METRICS_SYNC_SUCCESS=y
CONFIG_MEMFAULT_METRICS_MEMFAULT_SYNC_SUCCESS=y
CONFIG_MEMFAULT_METRICS_THREADS_DEFAULTS=y
CONFIG_MEMFAULT_METRICS_BOOT_TIME=y
CONFIG_MEMFAULT_METRICS_TCP_IP=n
CONFIG_MEMFAULT_METRICS_MEMORY_USAGE=y
CONFIG_MEMFAULT_HEAP_STATS=y
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_MEMFAULT_METRICS_THREADS=y

# CDR - nRF70 WiFi firmware statistics
# WARNING: Limited to 1 upload per device per 24 hours
CONFIG_MEMFAULT_CDR_ENABLE=y
CONFIG_NRF70_FW_STATS_CDR_ENABLED=y

# Certificate management
CONFIG_MEMFAULT_ROOT_CERT_STORAGE_TLS_CREDENTIAL_STORAGE=y
CONFIG_MEMFAULT_NCS_PROVISION_CERTIFICATES=y

# FOTA
CONFIG_MEMFAULT_FOTA=y
CONFIG_DFU_TARGET=y
CONFIG_DFU_TARGET_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_FOTA_DOWNLOAD=y
CONFIG_FOTA_DOWNLOAD_PROGRESS_EVT=y
CONFIG_DOWNLOADER=y
CONFIG_DOWNLOADER_MAX_FILENAME_SIZE=400
CONFIG_DOWNLOADER_STACK_SIZE=4096

# Disable POSIX file system (not needed, saves memory)
CONFIG_POSIX_FILE_SYSTEM=n

# ============================================================================
# Module: app_https_client
# ============================================================================
CONFIG_APP_HTTPS_HOSTNAME="example.com"
CONFIG_APP_HTTPS_REQUEST_INTERVAL_SEC=60
CONFIG_APP_HTTPS_CLIENT_LOG_LEVEL_INF=y

# ============================================================================
# Module: app_mqtt_client
# ============================================================================
# 6144: mqtt_helper_init() calls tls_credential_add() (cert parsing via mbedTLS)
# before the semaphore wait — needs more than the default 4096.
CONFIG_APP_MQTT_CLIENT_STACK_SIZE=6144
CONFIG_APP_MQTT_CLIENT_BROKER_HOSTNAME="test.mosquitto.org"
CONFIG_APP_MQTT_CLIENT_PUBLISH_TOPIC="Count"
CONFIG_APP_MQTT_CLIENT_PUBLISH_INTERVAL_SEC=60
CONFIG_APP_MQTT_CLIENT_LOG_LEVEL_INF=y
CONFIG_MQTT_HELPER=y
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_HELPER_PORT=8883
# Keepalive reduced to 15s for networks with aggressive NAT timeouts
CONFIG_MQTT_KEEPALIVE=15
CONFIG_MQTT_HELPER_SEC_TAG=955
CONFIG_MQTT_HELPER_PROVISION_CERTIFICATES=y
CONFIG_MQTT_HELPER_CERTIFICATES_FOLDER="src/modules/app_mqtt_client/cert"

# ============================================================================
# TLS / Sockets  (shared dependency for app_https_client and app_mqtt_client)
# ============================================================================
CONFIG_NET_SOCKETS_ENABLE_DTLS=n
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=5
CONFIG_NET_SOCKETS_TLS_MAX_CREDENTIALS=5
CONFIG_NET_SOCKETS_TLS_MAX_CIPHERSUITES=5
CONFIG_NET_SOCKETS_TLS_MAX_CLIENT_SESSION_COUNT=0
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=5



# ============================================================================
# Memory & Stack Configuration
# ============================================================================
# Stack sizes (sized from thread analyzer high-water marks)
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=2048
# Shell stack not needed when shell is disabled
# CONFIG_SHELL_STACK_SIZE=8000
CONFIG_APP_MAIN_LOG_LEVEL_INF=y

# Heap
# WPA supplicant and POSIX subsystems add ~46 KB through HEAP_MEM_POOL_ADD_SIZE_*
# BLE provisioning adds ~44 KB more
CONFIG_HEAP_MEM_POOL_SIZE=40960
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NRF_WIFI_GLOBAL_HEAP=n

# ============================================================================
# mbedTLS
# ============================================================================
# WiFi provisioning coexistence tuning (BLE + WPA supplicant scan/connect)
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
# 130KB: supports 3 concurrent TLS clients (Memfault ~30KB, HTTPS ~30KB, MQTT ~30KB)
# plus handshake overhead and fragmentation headroom. Matches master project.
# Lower values (96KB, 112KB) caused ENOMEM or crashes under concurrent TLS load.
CONFIG_MBEDTLS_HEAP_SIZE=130000

# Required for Memfault HTTPS, app_https_client, and app_mqtt_client TLS
CONFIG_MBEDTLS_X509_LIBRARY=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_TLS_LIBRARY=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
CONFIG_MBEDTLS_PSA_CRYPTO_LEGACY_RNG=y
CONFIG_MBEDTLS_RSA_C=y

# ROM optimizations - disable unused cipher modes and ECC curves
CONFIG_MBEDTLS_CIPHER_MODE_XTS=n
CONFIG_MBEDTLS_ECP_DP_SECP192R1_ENABLED=n
CONFIG_MBEDTLS_ECP_DP_SECP224R1_ENABLED=n
CONFIG_MBEDTLS_ECP_DP_SECP521R1_ENABLED=n
CONFIG_MBEDTLS_ECP_DP_BP256R1_ENABLED=n
CONFIG_MBEDTLS_ECP_DP_BP384R1_ENABLED=n
CONFIG_MBEDTLS_ECP_DP_BP512R1_ENABLED=n
CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED=n
CONFIG_MBEDTLS_ECP_DP_CURVE448_ENABLED=n

# ============================================================================
# Logging Configuration
# ============================================================================
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096
# Deferred mode: log messages are queued and processed in the logging thread,
# not inline in the calling thread (net_mgmt event thread, etc.)
CONFIG_LOG_MODE_DEFERRED=y

# ============================================================================
# Debug & Optimization
# ============================================================================
# C Library
CONFIG_MINIMAL_LIBC=n
CONFIG_PICOLIBC=y
CONFIG_NEWLIB_LIBC=n

