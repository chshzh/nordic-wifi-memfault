# ============================================================================
# Module: heap_monitor
# ============================================================================
# heap_monitor defaults (warn threshold, peak step, interval) are in
# heap_monitor/Kconfig.defaults. Override here only if non-default values or a
# different log level are needed.
CONFIG_HEAPS_MONITOR_LOG_LEVEL_INF=y

# ============================================================================
# Module: app_memfault
# ============================================================================
# All tuning defaults are in app_memfault/Kconfig.defaults.
# Only choices and project-specific values remain here.
# Enabled with CONFIG_APP_MEMFAULT_MODULE=y
# CONFIG_MEMFAULT_NCS_PROJECT_KEY="your project key here" is set via overlay-app-memfault-project-info.conf
CONFIG_MEMFAULT_HTTP_PERIODIC_UPLOAD_INTERVAL_SECS=60
CONFIG_MEMFAULT_METRICS_HEARTBEAT_INTERVAL_SECS=60

# Log levels (choices)
CONFIG_MEMFAULT_LOG_LEVEL_INF=y
CONFIG_MEMFAULT_NCS_LOG_LEVEL_INF=y

# FW version source (choice - cannot be in Kconfig.defaults)
CONFIG_MEMFAULT_NCS_FW_VERSION_STATIC=y

# Project-specific firmware version string (depends on MEMFAULT_NCS_FW_VERSION_STATIC)
# CONFIG_MEMFAULT_NCS_FW_VERSION="2.5.0"

# Certificate storage backend (choice - cannot be in Kconfig.defaults)
CONFIG_MEMFAULT_ROOT_CERT_STORAGE_TLS_CREDENTIAL_STORAGE=y

# CDR - nRF70 WiFi firmware statistics
# WARNING: Limited to 1 upload per device per 24 hours
CONFIG_NRF70_FW_STATS_CDR_ENABLED=y

# ============================================================================
# Module: app_https_client
# ============================================================================
# All tuning defaults are in app_https_client/Kconfig.defaults.
# 300 s interval matches PRD requirement (aligns with MQTT publish interval)
# Enabled with CONFIG_APP_HTTPS_CLIENT_MODULE=y
CONFIG_APP_HTTPS_REQUEST_INTERVAL_SEC=300
CONFIG_APP_HTTPS_CLIENT_LOG_LEVEL_INF=y

# ============================================================================
# Module: app_mqtt_client
# ============================================================================
# All tuning defaults are in app_mqtt_client/Kconfig.defaults.
# Only project-specific values and choices remain here.
# Enabled with CONFIG_APP_MQTT_CLIENT_MODULE=y
CONFIG_APP_MQTT_CLIENT_BROKER_HOSTNAME="broker.emqx.io"
CONFIG_APP_MQTT_CLIENT_PUBLISH_INTERVAL_SEC=300

# Hardware ID source: MAC address as client ID (choice - cannot be in Kconfig.defaults)
CONFIG_HW_ID_LIBRARY_SOURCE_NET_MAC=y

# Topic suffix uses uppercase "Count" to match the Memfault project convention.
CONFIG_APP_MQTT_CLIENT_PUBLISH_TOPIC="Count"
CONFIG_APP_MQTT_CLIENT_LOG_LEVEL_INF=y

# Project-specific TLS credential tag (provisioned to the device separately).
CONFIG_MQTT_HELPER_SEC_TAG=955

# ============================================================================
# TLS / Sockets  (shared dependency for app_https_client and app_mqtt_client)
# ============================================================================
CONFIG_NET_SOCKETS_ENABLE_DTLS=n
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=5
CONFIG_NET_SOCKETS_TLS_MAX_CREDENTIALS=5
CONFIG_NET_SOCKETS_TLS_MAX_CIPHERSUITES=5
CONFIG_NET_SOCKETS_TLS_MAX_CLIENT_SESSION_COUNT=0
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=5

# ============================================================================
# Wi-Fi Power Management
# ============================================================================
# Low power mode disabled: prioritise connection stability and upload latency
# over power saving. Re-enable for battery-powered applications.
CONFIG_NRF_WIFI_LOW_POWER=n

# ============================================================================
# Memory & Stack Configuration
# ============================================================================
# Stack sizes (sized from thread analyzer high-water marks on nRF7002DK)
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8192
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=5632
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=7168
CONFIG_NET_MGMT_EVENT_STACK_SIZE=6144
CONFIG_MEMFAULT_UPLOAD_THREAD_STACK_SIZE=6144
CONFIG_APP_HTTPS_CLIENT_STACK_SIZE=6144
CONFIG_APP_MQTT_CLIENT_STACK_SIZE=6144
# CONFIG_SHELL_STACK_SIZE=8000

# Heap
# CONFIG_HEAP_MEM_POOL_SIZE is the user floor. Kconfig enforces a minimum equal to
# the sum of all HEAP_MEM_POOL_ADD_SIZE_* values (~184 KB for this project):
#   ADD_SIZE_NRF70=150000  ADD_SIZE_HOSTAP=30000  ADD_SIZE_BOARD=4096  ADD_SIZE_POSIX=256
# Setting a value below that sum is silently raised to the sum unless
# HEAP_MEM_POOL_IGNORE_MIN=y is set.
# Runtime measurements show _system_heap peaking around 64.8 KB on the tested
# path. Keep roughly 150% of observed peak usage, rounded up to 96 KB.
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NRF_WIFI_GLOBAL_HEAP=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=110592

# ============================================================================
# mbedTLS
# ============================================================================
# WiFi provisioning coexistence tuning (BLE + WPA supplicant scan/connect)
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_MEMORY_DEBUG=y
# NOTE: CONFIG_MBEDTLS_DEBUG_C is incompatible with CONFIG_NRF_SECURITY=y.
# The nrf_oberon prebuilt library is built without MBEDTLS_DEBUG_C, so enabling
# it causes undefined references to mbedtls_ssl_states_str etc. at link time.
# Keep the original 8K RX record size for MQTT stability.
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=8192

# Required for Memfault HTTPS, app_https_client, and app_mqtt_client TLS
CONFIG_MBEDTLS_X509_LIBRARY=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_TLS_LIBRARY=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
# ============================================================================
# Logging Configuration
# ============================================================================
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096
# Deferred mode: log messages are queued and processed in the logging thread,
# not inline in the calling thread (net_mgmt event thread, etc.)
CONFIG_LOG_MODE_DEFERRED=y
# NET_LOG=y is required for any NET_*_LOG_LEVEL_* choice to become visible
# (all net module log choices depend on NET_LOG).
# All modules explicitly silenced to avoid FLASH overflow; only NET_SOCKETS at DBG.
CONFIG_NET_LOG=n
