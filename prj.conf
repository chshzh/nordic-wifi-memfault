# Module: led  (not yet implemented)
# ============================================================================

# ============================================================================
# Module: wifi_sta_prov_over_ble
# ============================================================================
# All BLE tuning defaults are in wifi_prov_over_ble/Kconfig.defaults.
# Only choices (log levels) remain here.
CONFIG_BT_WIFI_PROV_LOG_LEVEL_INF=y
CONFIG_WIFI_PROV_OVER_BLE_LOG_LEVEL_INF=y

# ============================================================================
# WiFi Infrastructure  (network/Kconfig.defaults owns all tuning defaults)
# ============================================================================
# WPA supplicant log level (choice - cannot be in Kconfig.defaults)
CONFIG_WIFI_NM_WPA_SUPPLICANT_LOG_LEVEL_INF=y
# WiFi credentials backend (choice - cannot be in Kconfig.defaults)
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
# Network buffer mode (choice - cannot be in Kconfig.defaults)
CONFIG_NET_BUF_FIXED_DATA_SIZE=y
CONFIG_NRF_WIFI_ZERO_COPY_TX=n
# Crypto backend for WPA supplicant (choice - cannot be in Kconfig.defaults).
# Using the NCS default HOSTAP_CRYPTO_ALT_LEGACY_PSA. The PSA-only alternative
# (HOSTAP_CRYPTO_ALT_PSA) makes MBEDTLS_RSA_C unavailable in NCS v3.2.4
# (gated by "if MBEDTLS_LEGACY_CRYPTO_C" in Kconfig.legacy) which breaks TLS
# connections to RSA-cert servers (Comodo AAA, DigiCert, Amazon Root CA).
# Build warning "Deprecated symbol MBEDTLS_LEGACY_CRYPTO_C" is expected in v3.2.4.

# ============================================================================
