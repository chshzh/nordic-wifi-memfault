# over power saving. Re-enable for battery-powered applications.
CONFIG_NRF_WIFI_LOW_POWER=n

# ============================================================================
# Memory & Stack Configuration
# ============================================================================
# Watermark Bytes 5024/0.9=5582 — configured in boards/nrf54lm20dk_nrf54lm20a_cpuapp.conf
# CONFIG_APP_HTTPS_CLIENT_STACK_SIZE=5582
# Watermark Bytes 5264/0.9=5848
CONFIG_APP_MQTT_CLIENT_STACK_SIZE=5848
# Watermark Bytes 4040/0.9=4488
CONFIG_MQTT_HELPER_STACK_SIZE=4488
# Watermark Bytes 1496/0.9=1662 (nRF54LM20DK peak, WiFi reconnect + Memfault upload)
CONFIG_MAIN_STACK_SIZE=1662
# nRF54LM20DK peak 4488/0.9=4988 (WiFi reconnect: wpa_cli_cmd+_wpa_ctrl_command+zvfs_poll_internal)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4988
# Watermark Bytes 1784/0.9=1982
CONFIG_BT_LONG_WQ_STACK_SIZE=1982
# Watermark Bytes 20072/0.9=22302
CONFIG_BT_RX_STACK_SIZE=22302
# Watermark Bytes 248/0.9=276
CONFIG_L2_WIFI_CONN_WQ_STACK_SIZE=276
# Watermark Bytes 5392/0.9=5991
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=5991
# Watermark Bytes 3896/0.9=4328
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=4328
# Watermark Bytes nrf70_bh_wq 1088/0.9=1208
CONFIG_NRF70_BH_WQ_STACK_SIZE=1208
# Watermark Bytes nrf70_intr_wq 792/0.9=880
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=880
# Watermark Bytes 1168/0.9=1297; kept at 2048 for network burst headroom
CONFIG_NET_RX_STACK_SIZE=2048
# Watermark Bytes 792/0.9=880; kept at 2048 for network burst headroom
CONFIG_NET_TX_STACK_SIZE=2048
# Watermark Bytes 4432/0.9=4924
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=4924
# Watermark Bytes 2940/0.9=3266
CONFIG_NET_MGMT_EVENT_STACK_SIZE=3266
# Watermark Bytes 4872/0.9=5413
CONFIG_MEMFAULT_UPLOAD_THREAD_STACK_SIZE=5413
# Watermark Bytes 4840/0.9=5377
CONFIG_MEMFAULT_HTTP_DEDICATED_WORKQUEUE_STACK_SIZE=5377
# Watermark Bytes 5040/0.9=5600
CONFIG_MEMFAULT_OTA_THREAD_STACK_SIZE=5600
# Stagger OTA connect-trigger to avoid DNS resolver contention with background
# upload on slow SPI bus (nRF54LM20DK). Both default to 30s; offset OTA to 60s.
CONFIG_MEMFAULT_OTA_CONNECT_DELAY_SEC=60
# Watermark Bytes 4824/0.9 = 5360
CONFIG_DOWNLOADER_STACK_SIZE=5360
# Watermark Bytes 568/0.9=631 (nRF54LM20DK DEFERRED mode; nRF7002DK 536)
# NOTE: re-enabling CONFIG_LOG_MODE_IMMEDIATE=y requires increasing to 4096
# (measured 1216/4096=29% on nRF54LM20DK with IMMEDIATE mode active).
# CONFIG_THREAD_ANALYZER_AUTO_STACK_SIZE=631
# CONFIG_SHELL_STACK_SIZE=8000

# Heap
# With both NRF_WIFI_GLOBAL_HEAP=n and WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=n, all
# HEAP_MEM_POOL_ADD_SIZE_* contributions (NRF71=150000, HOSTAP, BOARD, POSIX) are
# removed. HEAP_MEM_POOL_IGNORE_MIN=y is no longer needed — remove it once the
# app-only _system_heap watermark is confirmed with ZView.
# Re-measure _system_heap after this split; expect a significant drop from 57928 B
# (former value included Wi-Fi + WPA supplicant). Set to new watermark / 0.8.
# Using 72410 conservatively until re-measured.
# Watermark Bytes 976/0.8=1220
CONFIG_HEAP_MEM_POOL_SIZE=1220
# ONFIG_HEAP_MEM_POOL_SIZE=72410
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
# Wi-Fi driver moved to dedicated K_HEAPs — visible as wifi_drv_ctrl_mem_pool and
# wifi_drv_data_mem_pool in ZView. Defaults: ctrl=40000 B, data=130000 B.
# Measure ZView watermarks after a full STA connect + TLS upload cycle, then set
# each to watermark / 0.8.
CONFIG_NRF_WIFI_GLOBAL_HEAP=n
# Watermark Bytes 10288/0.8=12860
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=12860
# Watermark Bytes 27264/0.8=34080
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=34080
# WPA supplicant moved to its own dedicated K_HEAP — visible as
# wifi_nm_wpa_supplicant_mem_pool in ZView. Default for AP mode: 41808 B.
# Measure ZView watermark after a full connect cycle, then set to peak/0.8.
CONFIG_WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=n
# Watermark Bytes 24184/0.8=30230
CONFIG_WIFI_NM_WPA_SUPPLICANT_HEAP=30230
CONFIG_MBEDTLS_ENABLE_HEAP=y
# Watermark Bytes 25740/0.8=32175
CONFIG_MBEDTLS_HEAP_SIZE=32175

# ============================================================================
# mbedTLS
# ============================================================================
# WiFi provisioning coexistence tuning (BLE + WPA supplicant scan/connect)
CONFIG_NRF_SECURITY=y
# Route nrf_security through the legacy crypto config path. In NCS v3.3.0 the
# default is the PSA-only path (nrf_config.cmake), which forwards
# MBEDTLS_MEMORY_BUFFER_ALLOC_C but not MBEDTLS_MEMORY_DEBUG to nrf-config.h.
# Without MBEDTLS_MEMORY_DEBUG the heap_monitor module cannot link against
# mbedtls_memory_buffer_alloc_cur_get/_max_get. Enabling MBEDTLS_LEGACY_CRYPTO_C
# also keeps MBEDTLS_RSA_C available for the WPA supplicant TLS path
# (see Crypto backend note above). The associated v3.3.0 deprecation warning
# is silenced by selecting MBEDTLS_LEGACY_CRYPTO_C_SILENCE_DEPRECATION in the
# project Kconfig (the SDK symbol is promptless and cannot be set from here).
CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y
CONFIG_MBEDTLS_MEMORY_DEBUG=y
# NOTE: CONFIG_MBEDTLS_DEBUG_C is incompatible with CONFIG_NRF_SECURITY=y.
# The nrf_oberon prebuilt library is built without MBEDTLS_DEBUG_C, so enabling
# it causes undefined references to mbedtls_ssl_states_str etc. at link time.
# Keep the original 8K RX record size for MQTT stability.
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=8192

# Required for Memfault HTTPS, app_https_client, and app_mqtt_client TLS
CONFIG_MBEDTLS_X509_LIBRARY=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_TLS_LIBRARY=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
# example.com (Cloudflare) and other ECDSA-cert servers require ECDHE-ECDSA-* cipher
# suites. MBEDTLS_ECDSA_C is off by default when MBEDTLS_USE_PSA_CRYPTO is set (the
# NCS nrf_security PSA path), which disables MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED
# and causes connect() to fail with EHOSTUNREACH (errno 113) — no matching cipher.
CONFIG_MBEDTLS_ECDSA_C=y
