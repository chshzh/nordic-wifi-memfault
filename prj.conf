# Memory & Stack Configuration
# ============================================================================
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_MPU_STACK_GUARD=y

# Thread stacks
# optimized with ZView watermark measurements: 20% headroom for watermark<5120, 10% headroom for watermark>=5120
# sysworkq: Watermark Bytes 4528/0.8=5660 (WiFi reconnect: wpa_cli_cmd+_wpa_ctrl_command+zvfs_poll_internal)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=5660
# main: Watermark Bytes 1496/0.9=1662 (nRF54LM20DK peak, WiFi reconnect + Memfault upload)
CONFIG_MAIN_STACK_SIZE=1662
# idle: Watermark Bytes 248/0.8=310; Kept at 320
CONFIG_IDLE_STACK_SIZE=320

# memfault_upload_tid: Watermark Bytes 4928/0.8=6160
CONFIG_MEMFAULT_UPLOAD_THREAD_STACK_SIZE=6160
# mflt_upload: Watermark Bytes 4768/0.8=5960
CONFIG_MEMFAULT_PERIODIC_UPLOAD_DEDICATED_WORKQUEUE_STACK_SIZE=5960
# mflt_ota_triggers_tid: Watermark Bytes 5064/0.8=6330
CONFIG_MEMFAULT_OTA_THREAD_STACK_SIZE=6330
# Watermark Bytes 4824/0.8 = 6030
CONFIG_DOWNLOADER_STACK_SIZE=6030

# Watermark Bytes 5024/0.8=6280
CONFIG_APP_HTTPS_CLIENT_STACK_SIZE=6280
# app_mqtt_client_tid: Watermark Bytes 5272/0.9=5857
CONFIG_APP_MQTT_CLIENT_STACK_SIZE=5857
# mqtt_helper_thread: Watermark Bytes 4040/0.8=5050
CONFIG_MQTT_HELPER_STACK_SIZE=5050

# BT LW WQ: Watermark Bytes 2008/0.8=2510
CONFIG_BT_LONG_WQ_STACK_SIZE=2510
# BT RX WQ: Watermark Bytes 20080/0.9=22311
CONFIG_BT_RX_STACK_SIZE=22311
# bt_tx_processor: Watermark Bytes 408/0.8=510
CONFIG_BT_TX_PROCESSOR_STACK_SIZE=510
# ble_adv_daemon_wq: Watermark Bytes 2448/0.8=3060
CONFIG_ZEGO_WIFI_BLE_PROV_ADV_DAEMON_STACK_SIZE=3060

# Watermark Bytes 248/0.9=276
CONFIG_L2_WIFI_CONN_WQ_STACK_SIZE=276
# hostap_handler: Watermark Bytes 5384/0.9=5982
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=5982
# hostap_iface_wq: Watermark Bytes 3848/0.8=4810
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=4810
# nrf70_bh_wq: Watermark Bytes 1072/0.8=1340
CONFIG_NRF70_BH_WQ_STACK_SIZE=1340
# nrf70_intr_wq: Watermark Bytes 672/0.8=840
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=840

# rx_q: Watermark Bytes 1168/0.9=1297; kept at 2048 for network burst headroom
CONFIG_NET_RX_STACK_SIZE=2048
# tx_q: Watermark Bytes 800/0.8=1000; kept at 2048 for network burst headroom
CONFIG_NET_TX_STACK_SIZE=2048
# conn_mgr_monitor: Watermark Bytes 4416/0.8=5520
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=5520
# net_mgmt: Watermark Bytes 2808/0.8=3510
CONFIG_NET_MGMT_EVENT_STACK_SIZE=3510

# shell_uart: Watermark Bytes 808; Kept at 4096
# CONFIG_SHELL_STACK_SIZE=4096
# MPSL Work: Watermark Bytes 696; Kept at 1024
CONFIG_MPSL_WORK_STACK_SIZE=1024
# tcp_work: Watermark Bytes 488; Kept at 1024
CONFIG_NET_TCP_WORKQ_STACK_SIZE=1024
# logging: Watermark Bytes 752; Kept at 2048
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
# net_socket_service: Watermark Bytes 784
# CONFIG_NET_SOCKET_SERVICE_STACK_SIZE configured by zephyr/subsys/net/lib/sockets/Kconfig automatically
# mbox_wq: Watermark Bytes 400; Kept at 1024, used by nrf7002dk's IPC service for inter-processor communication
# CONFIG_IPC_SERVICE_BACKEND_RPMSG_WQ_STACK_SIZE=1024

# Heap
# optimized with ZView watermark measurements: 20% headroom of watermark
# With both NRF_WIFI_GLOBAL_HEAP=n and WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=n, all
# HEAP_MEM_POOL_ADD_SIZE_* contributions (NRF71=150000, HOSTAP, BOARD, POSIX) are
# removed. HEAP_MEM_POOL_IGNORE_MIN=y is no longer needed — remove it once the
# app-only _system_heap watermark is confirmed with ZView.
# Re-measure _system_heap after this split; expect a significant drop from 57928 B
# (former value included Wi-Fi + WPA supplicant). Set to new watermark / 0.8.
# Using 72410 conservatively until re-measured.
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
# Watermark Bytes 1152/0.8=1440
CONFIG_HEAP_MEM_POOL_SIZE=1440

CONFIG_MBEDTLS_ENABLE_HEAP=y
# Watermark Bytes 69720/0.8=87150
CONFIG_MBEDTLS_HEAP_SIZE=87150

# Wi-Fi driver moved to dedicated K_HEAPs — visible as wifi_drv_ctrl_mem_pool and
# wifi_drv_data_mem_pool in ZView. Defaults: ctrl=40000 B, data=130000 B.
# Measure ZView watermarks after a full STA connect + TLS upload cycle, then set
# each to watermark / 0.8.
CONFIG_NRF_WIFI_GLOBAL_HEAP=n
# Watermark Bytes 10288/0.8=12860
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=12860
# Watermark Bytes 28520/0.8=35650
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=35650

# WPA supplicant moved to its own dedicated K_HEAP — visible as
# wifi_nm_wpa_supplicant_mem_pool in ZView. Default for AP mode: 41808 B.
# Measure ZView watermark after a full connect cycle, then set to peak/0.8.
CONFIG_WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=n
# Watermark Bytes 24184/0.8=30230
CONFIG_WIFI_NM_WPA_SUPPLICANT_HEAP=30230



# ============================================================================
# mbedTLS
# ============================================================================
# WiFi provisioning coexistence tuning (BLE + WPA supplicant scan/connect)
CONFIG_NRF_SECURITY=y
# Route nrf_security through the legacy crypto config path. In NCS v3.3.0 the
# default is the PSA-only path (nrf_config.cmake), which forwards
# MBEDTLS_MEMORY_BUFFER_ALLOC_C but not MBEDTLS_MEMORY_DEBUG to nrf-config.h.
# Without MBEDTLS_MEMORY_DEBUG the memonitor brick cannot read mbedTLS heap usage
# via mbedtls_memory_buffer_alloc_cur_get/_max_get. Enabling MBEDTLS_LEGACY_CRYPTO_C
# also keeps MBEDTLS_RSA_C available for the WPA supplicant TLS path
# (see Crypto backend note above). The associated v3.3.0 deprecation warning
# is silenced by selecting MBEDTLS_LEGACY_CRYPTO_C_SILENCE_DEPRECATION in the
# project Kconfig (the SDK symbol is promptless and cannot be set from here).
CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y
CONFIG_MBEDTLS_MEMORY_DEBUG=y
# NOTE: CONFIG_MBEDTLS_DEBUG_C is incompatible with CONFIG_NRF_SECURITY=y.
# The nrf_oberon prebuilt library is built without MBEDTLS_DEBUG_C, so enabling
# it causes undefined references to mbedtls_ssl_states_str etc. at link time.
# Keep the original 8K RX record size for MQTT stability.
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=8192

# Required for Memfault HTTPS, app_https_client, and app_mqtt_client TLS
CONFIG_MBEDTLS_X509_LIBRARY=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_TLS_LIBRARY=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
# example.com (Cloudflare) and other ECDSA-cert servers require ECDHE-ECDSA-* cipher
# suites. MBEDTLS_ECDSA_C is off by default when MBEDTLS_USE_PSA_CRYPTO is set (the
# NCS nrf_security PSA path), which disables MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED
# and causes connect() to fail with EHOSTUNREACH (errno 113) — no matching cipher.
CONFIG_MBEDTLS_ECDSA_C=y
