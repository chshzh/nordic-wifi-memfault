# --- Application modules---

# ============================================================================
# main.c
# ============================================================================
CONFIG_APP_MAIN_LOG_LEVEL_INF=y

# ============================================================================
# Module: app_memfault
# ============================================================================
# All tuning defaults are in app_memfault/Kconfig.defaults.
# Only choices and project-specific values remain here.
CONFIG_APP_MEMFAULT_MODULE=y
# CONFIG_MEMFAULT_NCS_PROJECT_KEY="your project key here" is set via overlay-app-memfault-project-info.conf
CONFIG_MEMFAULT_FOTA=y
# Heartbeats Limit= 100 per day, 24x60x60/100 = 864 seconds
# Other metrics collection by apps should align with heartbeat interval to avoid wasting resources
CONFIG_MEMFAULT_METRICS_HEARTBEAT_INTERVAL_SECS=900
# CONFIG_MEMFAULT_HTTP_PERIODIC_UPLOAD_INTERVAL_SECS is deprecated, use CONFIG_MEMFAULT_PERIODIC_UPLOAD_INTERVAL_SECS instead
CONFIG_MEMFAULT_PERIODIC_UPLOAD_INTERVAL_SECS=900
# OTA checks Limit= 100 per day, 60 min interval = 24 checks/day
CONFIG_MEMFAULT_OTA_CHECK_INTERVAL_MIN=60

# Stagger OTA connect-trigger to avoid DNS resolver contention with background
# upload on slow SPI bus (nRF54LM20DK). Both default to 30s; offset OTA to 60s.
CONFIG_MEMFAULT_OTA_CONNECT_DELAY_SEC=60
CONFIG_MEMFAULT_METRICS_SYNC_SUCCESS=y
CONFIG_MEMFAULT_METRICS_MEMFAULT_SYNC_SUCCESS=y
# Log levels (choices)
CONFIG_MEMFAULT_LOGGING_RAM_SIZE=4096
CONFIG_MEMFAULT_EVENT_STORAGE_SIZE=4096
CONFIG_MEMFAULT_LOG_LEVEL_INF=y
CONFIG_MEMFAULT_NCS_LOG_LEVEL_INF=y
# ZView Kconfig symbols are now auto-selected by CONFIG_ZEGO_MEMONITOR_ZVIEW=y above.
# CONFIG_MEMFAULT_NCS_STACK_METRICS=n: thread stack metrics are now driven by the
# memonitor subscriber (app_memfault_memonitor_metrics.c) instead of the NCS SDK mechanism.
CONFIG_MEMFAULT_NCS_STACK_METRICS=n
# FW version source (choice - cannot be in Kconfig.defaults)
CONFIG_MEMFAULT_NCS_FW_VERSION_STATIC=y
# Project-specific firmware version string (depends on MEMFAULT_NCS_FW_VERSION_STATIC)
# CONFIG_MEMFAULT_NCS_FW_VERSION="2.5.0"
# Certificate storage backend (choice - cannot be in Kconfig.defaults)
CONFIG_MEMFAULT_ROOT_CERT_STORAGE_TLS_CREDENTIAL_STORAGE=y
# CDR - nRF70 WiFi firmware statistics
# WARNING: Limited to 1 upload per device per 24 hours
CONFIG_NRF70_FW_STATS_CDR_ENABLED=y

# ============================================================================
# Module: app_mqtt_client
# ============================================================================
# All tuning defaults are in app_mqtt_client/Kconfig.defaults.
# Only project-specific values and choices remain here.
CONFIG_APP_MQTT_CLIENT_MODULE=y
CONFIG_APP_MQTT_CLIENT_BROKER_HOSTNAME="broker.emqx.io"
# Keep same as CONFIG_MEMFAULT_METRICS_HEARTBEAT_INTERVAL_SECS, aligns with Memfault heartbeat/upload)
CONFIG_APP_MQTT_CLIENT_PUBLISH_INTERVAL_SEC=900

# Topic suffix uses uppercase "Count" to match the Memfault project convention.
CONFIG_APP_MQTT_CLIENT_PUBLISH_TOPIC="Count"
CONFIG_APP_MQTT_CLIENT_LOG_LEVEL_INF=y

# Project-specific TLS credential tag (provisioned to the device separately).
CONFIG_MQTT_HELPER_SEC_TAG=955

# ============================================================================
# Module: app_https_client
# ============================================================================
# All tuning defaults are in app_https_client/Kconfig.defaults.
# Module is disabled on nRF7002DK (insufficient flash); enabled in
# boards/nrf54lm20dk_nrf54lm20a_cpuapp.conf together with its custom values.
# The lines below are kept as reference; active values live in the board conf.
# Keep same as CONFIG_MEMFAULT_METRICS_HEARTBEAT_INTERVAL_SECS (aligns with Memfault heartbeat/upload)
CONFIG_APP_HTTPS_CLIENT_MODULE=y
CONFIG_APP_HTTPS_REQUEST_INTERVAL_SEC=900
CONFIG_APP_HTTPS_CLIENT_LOG_LEVEL_INF=y

