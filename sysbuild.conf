SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_PARTITION_MANAGER=n

# nRF5340 (nrf7002dk) only: the BLE controller runs on the network core
# over IPC. Build the upstream Zephyr hci_ipc sample as the netcore image
# so the Wi-Fi provisioning over BLE module can open the HCI driver.
# On nrf54lm20dk SUPPORT_NETCORE=n (single-core SoC), so this setting
# has no effect there and produces a benign Kconfig choice warning.
# Kconfig choice symbols cannot be conditionally defaulted from outside
# their choice block, so an unconditional assignment here is the only option.
SB_CONFIG_NETCORE_HCI_IPC=y
