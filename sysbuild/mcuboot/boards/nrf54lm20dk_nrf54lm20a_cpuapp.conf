CONFIG_HW_STACK_PROTECTION=n
CONFIG_BOOT_WATCHDOG_FEED=n

# The default nRF54LM20 image slots are larger than the MCUboot default sector cap.
CONFIG_BOOT_MAX_IMG_SECTORS=512

# Avoid SYSCOUNTER drift across software resets in MCUboot on nRF54L.
CONFIG_TICKLESS_KERNEL=y